<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background: linear-gradient(135deg,#ff2e93,#ff85c1,#ff2e93);

background-size:400% 400%;
animation:bgMove 10s infinite alternate;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.container{

width:360px;
text-align:center;

backdrop-filter: blur(10px);

}

.profile{

width:120px;
height:120px;

border-radius:50%;

border:4px solid white;

margin:auto;
margin-bottom:15px;

object-fit:cover;

box-shadow:0 0 20px rgba(255,255,255,.4);

}

h1{

margin-bottom:6px;

}

.bio{

opacity:.9;

margin-bottom:25px;

}

.link{

display:flex;

align-items:center;
justify-content:center;

gap:12px;

background: rgba(255,255,255,0.25);

backdrop-filter: blur(12px);

padding:16px;

margin:12px 0;

border-radius:14px;

color:white;

text-decoration:none;

font-size:18px;

font-weight:bold;

transition:.25s;

border:1px solid rgba(255,255,255,0.4);

}

.link:hover{

transform:scale(1.05);

background: rgba(255,255,255,0.35);

}

.icon{

font-size:20px;

}

.footer{

margin-top:25px;

font-size:13px;

opacity:.7;

}

</style>

</head>
