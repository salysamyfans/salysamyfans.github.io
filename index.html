<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Links</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
padding:0;
font-family:sans-serif;
height:100vh;

background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
}

.overlay{
background:rgba(0,0,0,0.55);
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
color:white;
width:320px;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
margin-bottom:15px;
}

h2{
margin-bottom:30px;
}

.link{
display:block;
background:white;
color:black;
padding:14px;
margin:12px 0;
border-radius:12px;
text-decoration:none;
font-size:18px;
font-weight:bold;
transition:0.3s;
}

.link i{
margin-right:10px;
}

.link:hover{
transform:scale(1.05);
background:#f0f0f0;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<img class="profile" src="https://i.pravatar.cc/300">

<h2>@salysamy</h2>

<a class="link" href="https://facebook.com" target="_blank">
<i class="fab fa-facebook"></i> Facebook
</a>

<a class="link" href="https://instagram.com" target="_blank">
<i class="fab fa-instagram"></i> Instagram
</a>

<a class="link" href="https://tiktok.com" target="_blank">
<i class="fab fa-tiktok"></i> TikTok
</a>

<a class="link" href="https://t.me/" target="_blank">
<i class="fab fa-telegram"></i> Telegram
</a>

</div>

</div>

</body>
</html>
